      2025-07-18T13:42:43Z,DCGM_FI_DEV_GPU_TEMP,1,nvidia1,GPU-aabb0002-0002-0002-0002-000000000002,NVIDIA A100-SXM4-80GB,node-1,,,82,,

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ──────────────────────────────────────────────────────────────────────────────
# Collector
# ──────────────────────────────────────────────────────────────────────────────
collector:
  image:
    registry: ""
    repository: collector
    tag: ""

  replicaCount: 2

  # Must match the env-var names read by cmd/collector/main.go
  consumerGroup: telemetry-collectors
  batchSize: 100       # → COLLECT_BATCH_SIZE
  pollIntervalMs: 100  # → COLLECT_POLL_MS

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ──────────────────────────────────────────────────────────────────────────────
# API Gateway
# ──────────────────────────────────────────────────────────────────────────────
apiGateway:
  image:
    registry: ""
    repository: api-gateway
    tag: ""

  replicaCount: 2
  port: 8080

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: gpu-telemetry.local
    path: /
    pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ──────────────────────────────────────────────────────────────────────────────
# PostgreSQL  (inline StatefulSet – no external Helm dependency needed)
# ──────────────────────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  image: postgres:16-alpine
  auth:
    username: telemetry
    password: changeme
    database: telemetry
  storage:
    size: 10Gi
    storageClassName: ""   # empty = cluster default StorageClass
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ──────────────────────────────────────────────────────────────────────────────
# External database override
# Set enabled=true and provide a full DSN to skip the bundled PostgreSQL.
# ──────────────────────────────────────────────────────────────────────────────
db:
  external:
    enabled: false
    url: ""   # postgres://user:pass@host:5432/dbname?sslmode=require
