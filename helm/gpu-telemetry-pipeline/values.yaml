# ──────────────────────────────────────────────────────────────────────────────
# gpu-telemetry-pipeline Helm values
# ──────────────────────────────────────────────────────────────────────────────

# Global settings shared by all services.
global:
  imageRegistry: ""       # e.g. "registry.example.com"  – prepended to every image
  imagePullSecrets: []    # e.g. [{name: regcred}]

# Default image tag and pull policy for all services.
# Override per-service with <service>.image.tag.
image:
  tag: latest
  pullPolicy: IfNotPresent

# ──────────────────────────────────────────────────────────────────────────────
# MQ Server
# ──────────────────────────────────────────────────────────────────────────────
mqServer:
  image:
    registry: ""
    repository: mq-server
    tag: ""

  replicaCount: 1

  partitions: 16
  maxQueueSize: 4096
  listenAddr: ":9000"
  walPath: ""          # empty = WAL disabled (no PVC needed)
  consumerTTL: "30s"   # how long before an idle consumer is evicted; "0s" = disabled
  evictInterval: "10s" # how often the eviction loop scans for stale consumers

  service:
    type: ClusterIP
    port: 9000

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ──────────────────────────────────────────────────────────────────────────────
# Streamer
# ──────────────────────────────────────────────────────────────────────────────
streamer:
  image:
    registry: ""
    repository: streamer
    tag: ""

  replicaCount: 1

  intervalMs: 100
  batchSize: 50

  # CSV data mounted at /data/metrics.csv.
  # Set existingConfigMap to the name of a pre-existing ConfigMap that has
  # a key "metrics.csv", OR leave it empty to use csv.data below.
  csv:
    existingConfigMap: ""
    # Column layout must match data/dcgm_metrics.csv and the streamer parseRow expectations:
    #   [0] timestamp  [1] metric_name  [2] gpu_id  [3] device
    #   [4] uuid       [5] modelName    [6] Hostname [7] container
    #   [8] pod        [9] namespace   [10] value   [11] labels_raw
    data: |
      timestamp,metric_name,gpu_id,device,uuid,modelName,Hostname,container,pod,namespace,value,labels_raw
      2025-07-18T13:42:33Z,DCGM_FI_DEV_GPU_UTIL,0,nvidia0,GPU-aabb0001-0001-0001-0001-000000000001,NVIDIA A100-SXM4-80GB,node-1,,,,45,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_MEM_COPY_UTIL,0,nvidia0,GPU-aabb0001-0001-0001-0001-000000000001,NVIDIA A100-SXM4-80GB,node-1,,,,12,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_SM_CLOCK,0,nvidia0,GPU-aabb0001-0001-0001-0001-000000000001,NVIDIA A100-SXM4-80GB,node-1,,,,1350,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_MEM_CLOCK,0,nvidia0,GPU-aabb0001-0001-0001-0001-000000000001,NVIDIA A100-SXM4-80GB,node-1,,,,1215,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_POWER_USAGE,0,nvidia0,GPU-aabb0001-0001-0001-0001-000000000001,NVIDIA A100-SXM4-80GB,node-1,,,,220.5,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_GPU_TEMP,0,nvidia0,GPU-aabb0001-0001-0001-0001-000000000001,NVIDIA A100-SXM4-80GB,node-1,,,,72,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_FB_USED,0,nvidia0,GPU-aabb0001-0001-0001-0001-000000000001,NVIDIA A100-SXM4-80GB,node-1,,,,16384,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_FB_FREE,0,nvidia0,GPU-aabb0001-0001-0001-0001-000000000001,NVIDIA A100-SXM4-80GB,node-1,,,,64000,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_GPU_UTIL,1,nvidia1,GPU-aabb0002-0002-0002-0002-000000000002,NVIDIA A100-SXM4-80GB,node-1,,,,78,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_MEM_COPY_UTIL,1,nvidia1,GPU-aabb0002-0002-0002-0002-000000000002,NVIDIA A100-SXM4-80GB,node-1,,,,34,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_SM_CLOCK,1,nvidia1,GPU-aabb0002-0002-0002-0002-000000000002,NVIDIA A100-SXM4-80GB,node-1,,,,1410,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_MEM_CLOCK,1,nvidia1,GPU-aabb0002-0002-0002-0002-000000000002,NVIDIA A100-SXM4-80GB,node-1,,,,1215,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_POWER_USAGE,1,nvidia1,GPU-aabb0002-0002-0002-0002-000000000002,NVIDIA A100-SXM4-80GB,node-1,,,,310.8,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_GPU_TEMP,1,nvidia1,GPU-aabb0002-0002-0002-0002-000000000002,NVIDIA A100-SXM4-80GB,node-1,,,,81,
      2025-07-18T13:42:33Z,DCGM_FI_DEV_FB_USED,1,nvidia1,GPU-aabb0002-0002-0002-0002-000000000002,NVIDIA A100-SXM4-80GB,node-1,,,,40960,
