{{- $dbURL := include "gpu-telemetry-pipeline.databaseURL" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gpu-telemetry-pipeline.fullname" . }}-db-secret
  labels:
    {{- include "gpu-telemetry-pipeline.labels" . | nindent 4 }}
type: Opaque
data:
  # Full DSN consumed by collector and api-gateway via DATABASE_URL.
  url: {{ $dbURL | b64enc | quote }}
  # Raw password consumed by the postgres container via POSTGRES_PASSWORD.
  pgpassword: {{ .Values.postgresql.auth.password | b64enc | quote }}
