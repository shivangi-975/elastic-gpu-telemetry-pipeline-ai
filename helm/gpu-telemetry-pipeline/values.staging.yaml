# Staging environment overrides.
# Merged on top of values.yaml during deploy-staging in .gitlab-ci.yml.

mqServer:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

streamer:
  replicaCount: 1
  intervalMs: 100
  batchSize: 50

collector:
  replicaCount: 1

apiGateway:
  replicaCount: 1
  ingress:
    enabled: true
    className: nginx
    host: gpu-telemetry.staging.example.com
    tls: []

postgresql:
  enabled: true
  storage:
    size: 5Gi
