# GitHub Actions CI for the GPU Telemetry Pipeline.
#
# Runs on every push/PR to main:
#   1. Build all packages
#   2. Run unit tests (-short skips integration tests that need Docker)
#   3. Generate coverage report

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -short -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
