---
# GPU Telemetry Pipeline — GitLab CI/CD
#
# Stages:
#   test     → unit + integration tests, coverage report
#   build    → compile binaries + build & push Docker images
#   deploy   → helm upgrade/install to staging then production
#
# Required CI/CD variables (set in GitLab → Settings → CI/CD → Variables):
#   REGISTRY          Docker registry host, e.g. registry.gitlab.com/myorg
#   REGISTRY_USER     Registry login username
#   REGISTRY_PASSWORD Registry login password / token
#   KUBE_CONFIG       Base64-encoded kubeconfig with cluster access

variables:
  REGISTRY: registry.gitlab.com/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME
  TAG: $CI_COMMIT_SHORT_SHA
  HELM_RELEASE: gpu-telemetry
  GO_VERSION: "1.22"

default:
  image: golang:${GO_VERSION}-alpine
  tags:
    - docker

stages:
  - test
  - build
  - deploy

# ── Test ───────────────────────────────────────────────────────────────────────

unit-test:
  stage: test
  script:
    - go test ./... -short -race -count=1 -coverprofile=coverage.out -covermode=atomic
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.out
    expire_in: 1 week

integration-test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  services:
    - name: docker:dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  before_script:
    - apk add --no-cache docker-cli
  script:
    - go test ./internal/store/... -timeout=120s -v
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Build ──────────────────────────────────────────────────────────────────────

.docker-build-base:
  stage: build
  image: docker:26
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin
  needs:
    - unit-test

docker-build-push:
  extends: .docker-build-base
  parallel:
    matrix:
      - SERVICE: [api-gateway, mq-server, streamer, collector]
  script:
    - |
      docker build \
        --file  build/Dockerfile.$SERVICE \
        --tag   $REGISTRY/$SERVICE:$TAG \
        --tag   $REGISTRY/$SERVICE:latest \
        --label "org.opencontainers.image.revision=$TAG" \
        --label "org.opencontainers.image.source=$CI_PROJECT_URL" \
        --cache-from $REGISTRY/$SERVICE:latest \
        .
    - docker push $REGISTRY/$SERVICE:$TAG
    - docker push $REGISTRY/$SERVICE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ── Deploy ─────────────────────────────────────────────────────────────────────

.helm-deploy-base:
  stage: deploy
  image:
    name: alpine/helm:3.14.0
    entrypoint: [""]
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
    - helm dependency update helm/gpu-telemetry-pipeline
  needs:
    - docker-build-push

deploy-staging:
  extends: .helm-deploy-base
  environment:
    name: staging
    url: https://gpu-telemetry.staging.example.com
  variables:
    HELM_NS: telemetry-staging
  script:
    - |
      helm upgrade --install $HELM_RELEASE helm/gpu-telemetry-pipeline \
        --namespace   $HELM_NS \
        --create-namespace \
        --set image.registry=$REGISTRY \
        --set image.tag=$TAG \
        --values helm/gpu-telemetry-pipeline/values.yaml \
        --values helm/gpu-telemetry-pipeline/values.staging.yaml \
        --wait \
        --timeout 5m
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-production:
  extends: .helm-deploy-base
  environment:
    name: production
    url: https://gpu-telemetry.example.com
  variables:
    HELM_NS: telemetry
  script:
    - |
      helm upgrade --install $HELM_RELEASE helm/gpu-telemetry-pipeline \
        --namespace   $HELM_NS \
        --create-namespace \
        --set image.registry=$REGISTRY \
        --set image.tag=$TAG \
        --values helm/gpu-telemetry-pipeline/values.yaml \
        --values helm/gpu-telemetry-pipeline/values.production.yaml \
        --wait \
        --timeout 5m
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
  allow_failure: false
